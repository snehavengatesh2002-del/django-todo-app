{% extends 'main.html' %}

{% block content %}

<div class="form-wrapper">

<h2>Update Task</h2>

<form method="POST">

{% csrf_token %}

<input type="text"
name="title"
value="{{ data.title }}"
required>

<input type="text"
name="desc"
value="{{ data.desc }}"
required>

<button type="submit">
Update Task
</button>

</form>

</div>

{% endblock %}
