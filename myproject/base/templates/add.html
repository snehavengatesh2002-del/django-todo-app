{% extends 'main.html' %}

{% block content %}

<div class="form-wrapper">

<h2>Add New Task</h2>

<form method="POST">

{% csrf_token %}

<input type="text"
name="title"
placeholder="Enter task title"
required>

<input type="text"
name="desc"
placeholder="Enter task description"
required>

<button type="submit">
Save Task
</button>

</form>

</div>

{% endblock %}
